name: Validate OpenCode package

on:
  push:
    branches: ["master", "improve/**"]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2
      - name: Validate repository structure and JSONC
        id: repository-validation
        shell: bash
        run: |
          set +e
          node scripts/validate.mjs 2>&1 | tee validation.log
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Upload validation failure log
        if: failure() && steps.repository-validation.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: validation-failure-log
          path: validation.log
          retention-days: 1
      - name: Test evolution safety core
        run: bun test tests/evolution-core.test.ts tests/memory-db.test.ts tests/plugin-lifecycle.test.ts
      - name: Check shell syntax
        run: bash -n install.sh

  windows-installer:
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Test PowerShell project/global installers
        run: bun test tests/installers.test.ts
